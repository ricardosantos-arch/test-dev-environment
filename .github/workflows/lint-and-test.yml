name: Lint & Unit Tests

"on":
  pull_request:
    branches: [developer]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Detect project type
        id: detect
        run: |
          if [ -f "requirements.txt" ] || [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then
            echo "lang=python" >> $GITHUB_OUTPUT
          elif [ -f "package.json" ]; then
            echo "lang=node" >> $GITHUB_OUTPUT
          elif [ -f "go.mod" ]; then
            echo "lang=go" >> $GITHUB_OUTPUT
          else
            echo "lang=generic" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.detect.outputs.lang == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python linters
        if: steps.detect.outputs.lang == 'python'
        run: pip install ruff black

      - name: Run Ruff (Python)
        if: steps.detect.outputs.lang == 'python'
        run: ruff check . --output-format=github

      - name: Run Black check (Python)
        if: steps.detect.outputs.lang == 'python'
        run: black --check .

      - name: Setup Node
        if: steps.detect.outputs.lang == 'node'
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install and lint (Node)
        if: steps.detect.outputs.lang == 'node'
        run: |
          npm ci
          npm run lint || echo "No lint script found"

      - name: Lint Docker Compose files
        run: |
          if command -v docker compose &>/dev/null; then
            for f in docker-compose*.yml; do
              if [ -f "$f" ]; then
                echo "Validating $f..."
                docker compose -f "$f" config --quiet 2>&1 || echo "Warning: $f validation issue"
              fi
            done
          else
            echo "Docker compose not available, skipping compose validation"
          fi

      - name: Validate YAML files
        run: |
          pip install yamllint
          find . -name '*.yml' -o -name '*.yaml' | grep -v node_modules | grep -v .git | head -50 | xargs yamllint -d relaxed || true

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Detect project type
        id: detect
        run: |
          if [ -f "requirements.txt" ] || [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then
            echo "lang=python" >> $GITHUB_OUTPUT
          elif [ -f "package.json" ]; then
            echo "lang=node" >> $GITHUB_OUTPUT
          elif [ -f "go.mod" ]; then
            echo "lang=go" >> $GITHUB_OUTPUT
          else
            echo "lang=generic" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.detect.outputs.lang == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies and test (Python)
        if: steps.detect.outputs.lang == 'python'
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install pytest pytest-cov
          pytest --tb=short --junitxml=test-results.xml || echo "No tests found"

      - name: Setup Node
        if: steps.detect.outputs.lang == 'node'
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install and test (Node)
        if: steps.detect.outputs.lang == 'node'
        run: |
          npm ci
          npm test || echo "No test script found"

      - name: Run shell script tests
        run: |
          if [ -d "tests" ]; then
            echo "Running tests in tests/ directory..."
            for t in tests/*.sh; do
              [ -f "$t" ] && bash "$t"
            done
          fi
          echo "Basic validation: checking setup scripts exist and are valid"
          [ -f "setup.sh" ] && bash -n setup.sh && echo "setup.sh syntax OK"
          [ -f "setup.ps1" ] && echo "setup.ps1 exists OK"

      - name: Validate Docker Compose
        run: |
          echo "Checking docker-compose files parse correctly..."
          for f in docker-compose*.yml; do
            if [ -f "$f" ]; then
              python3 -c "import yaml; yaml.safe_load(open('$f'))" && echo "$f: YAML valid"
            fi
          done
